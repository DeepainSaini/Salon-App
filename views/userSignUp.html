<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/css/userSignUp.css"> 
</head>
<body>

    <div class="signup-container">
        <h2>Create Account</h2>
        <form id="signupForm">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
            <label for="role">Account Type</label>
            <select id="role" name="role" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: white;">
                <option value="Customer">Customer</option>
                <option value="Admin">Salon Owner</option>
            </select>
            </div>

            <button type="submit" class="signup-btn">Sign Up</button>
            <div id="errormsg" class="errormsg"></div>
            
            <p class="link">Already have an account? <a href="/user/login">Log in</a></p>
            
        </form>
    </div>

    <script src="/js/userSignUp.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>

</body>
</html>
