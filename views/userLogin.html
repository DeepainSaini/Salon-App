<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon App - Login</title>
    <link rel="stylesheet" href="/css/userLogin.css">
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Enter your password">
        </div>
        <button type="submit">Log In</button>
    </form>
    <div id="errormsg" class="errormsg"></div>
            
    <p class="link">Doesn't have an account.? <a href="/user/signup">Sign Up</a></p>
    <p class="link">Business Login In? <a href="#">Click Here</a></p>
</div>

<script src="/js/userLogin.js"></script> 
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>
</body>
</html>
